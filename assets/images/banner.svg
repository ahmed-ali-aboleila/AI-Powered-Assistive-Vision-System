<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600">
  <defs>
    <!-- Background Soft Gradients -->
    <radialGradient id="grad-blue" cx="20%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="grad-purple" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="grad-green" cx="50%" cy="0%" r="40%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft Drop Shadow for Icons -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Solid White Background -->
  <rect width="100%" height="100%" fill="#ffffff" />
  
  <!-- Overlay Soft Gradients -->
  <rect width="100%" height="100%" fill="url(#grad-blue)" />
  <rect width="100%" height="100%" fill="url(#grad-purple)" />
  <rect width="100%" height="100%" fill="url(#grad-green)" />

  <!-- Titles -->
  <text x="800" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="60" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="-1">AI-Powered Assistive Vision System</text>
  
  <!-- Subtitles -->
  <text x="800" y="260" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" fill="#64748b" text-anchor="middle">Real-Time Face Recognition • Emotion Recognition</text>
  <text x="800" y="300" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" fill="#64748b" text-anchor="middle">Voice Interaction • Raspberry Pi Support</text>

  <!-- Icon Section -->
  <!-- 1. Camera -->
  <g transform="translate(350, 440)">
    <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="-35" y="-35" width="70" height="70" rx="18" fill="#eff6ff" />
    <g transform="scale(1.2)" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M -16 -8 L -16 12 C -16 14.2 -14.2 16 -12 16 L 12 16 C 14.2 16 16 14.2 16 12 L 16 -8 C 16 -10.2 14.2 -12 12 -12 L 8 -12 L 5 -18 L -5 -18 L -8 -12 L -12 -12 C -14.2 -12 -16 -10.2 -16 -8 Z" />
      <circle cx="0" cy="2" r="6" />
    </g>
    <text x="0" y="75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Camera</text>
  </g>

  <!-- 2. Face Recognition -->
  <g transform="translate(530, 440)">
    <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="-35" y="-35" width="70" height="70" rx="18" fill="#faf5ff" />
    <g transform="scale(1.2)" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M -16 -16 L -20 -16 L -20 -12" />
      <path d="M 16 -16 L 20 -16 L 20 -12" />
      <path d="M -16 16 L -20 16 L -20 12" />
      <path d="M 16 16 L 20 16 L 20 12" />
      <circle cx="0" cy="-4" r="5" />
      <path d="M -8 10 C -8 6 8 6 8 10" />
    </g>
    <text x="0" y="75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Face Recognition</text>
  </g>

  <!-- 3. Emotion Detection -->
  <g transform="translate(710, 440)">
    <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="-35" y="-35" width="70" height="70" rx="18" fill="#f0fdf4" />
    <g transform="scale(1.2)" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="0" cy="0" r="16" />
      <circle cx="-5" cy="-3" r="1.5" fill="#22c55e" stroke="none" />
      <circle cx="5" cy="-3" r="1.5" fill="#22c55e" stroke="none" />
      <path d="M -6 6 C -2 10 2 10 6 6" />
    </g>
    <text x="0" y="75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Emotion Detection</text>
  </g>

  <!-- 4. Voice Assistant -->
  <g transform="translate(890, 440)">
    <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="-35" y="-35" width="70" height="70" rx="18" fill="#eff6ff" />
    <g transform="scale(1.2)" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="-4" y="-12" width="8" height="16" rx="4" />
      <path d="M -10 -2 C -10 4 10 4 10 -2" />
      <line x1="0" y1="7" x2="0" y2="14" />
      <line x1="-5" y1="14" x2="5" y2="14" />
    </g>
    <text x="0" y="75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Voice Assistant</text>
  </g>

  <!-- 5. Artificial Intelligence -->
  <g transform="translate(1070, 440)">
    <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="-35" y="-35" width="70" height="70" rx="18" fill="#faf5ff" />
    <g transform="scale(1.2)" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="-10" cy="-10" r="3" />
      <circle cx="10" cy="-10" r="3" />
      <circle cx="-10" cy="10" r="3" />
      <circle cx="10" cy="10" r="3" />
      <circle cx="0" cy="0" r="3" />
      <line x1="-7" y1="-7" x2="-3" y2="-3" />
      <line x1="7" y1="-7" x2="3" y2="-3" />
      <line x1="-7" y1="7" x2="-3" y2="3" />
      <line x1="7" y1="7" x2="3" y2="3" />
      <line x1="-10" y1="-7" x2="-10" y2="7" />
    </g>
    <text x="0" y="75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Artificial Intelligence</text>
  </g>

  <!-- 6. Raspberry Pi -->
  <g transform="translate(1250, 440)">
    <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="-35" y="-35" width="70" height="70" rx="18" fill="#f0fdf4" />
    <g transform="scale(1.2)" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="-12" y="-12" width="24" height="24" rx="2" />
      <line x1="-16" y1="-6" x2="-12" y2="-6" />
      <line x1="-16" y1="0" x2="-12" y2="0" />
      <line x1="-16" y1="6" x2="-12" y2="6" />
      <line x1="12" y1="-6" x2="16" y2="-6" />
      <line x1="12" y1="0" x2="16" y2="0" />
      <line x1="12" y1="6" x2="16" y2="6" />
      <line x1="-6" y1="-16" x2="-6" y2="-12" />
      <line x1="0" y1="-16" x2="0" y2="-12" />
      <line x1="6" y1="-16" x2="6" y2="-12" />
      <line x1="-6" y1="12" x2="-6" y2="16" />
      <line x1="0" y1="12" x2="0" y2="16" />
      <line x1="6" y1="12" x2="6" y2="16" />
      <rect x="-4" y="-4" width="8" height="8" rx="1" />
    </g>
    <text x="0" y="75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Raspberry Pi</text>
  </g>

</svg>
